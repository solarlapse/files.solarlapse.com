version: "3"

tasks:
  download:
    desc: "Download 'public/videos/suvi' files"
    cmds:
      - task: "primary-094:download"
      - task: "primary-131:download"
      - task: "primary-171:download"
      - task: "primary-195:download"
      - task: "primary-284:download"
      - task: "primary-304:download"
      - task: "secondary-094:download"
      - task: "secondary-131:download"
      - task: "secondary-171:download"
      - task: "secondary-195:download"
      - task: "secondary-284:download"
      - task: "secondary-304:download"

  deploy:
    desc: "Deploy 'public/videos/suvi' files"
    deps:
      - task: "download"
    cmds:
      - task: ":ftp:sync"
        vars:
          SOURCE_DIR: "public/videos/suvi"
          TARGET_DIR: "/videos/suvi"

  primary-094:download:
    desc: "Download 'public/videos/suvi/suvi-primary-094.mp4'"
    cmds:
      - task: ":swpc:download"
        vars:
          OUTPUT_DIR: "public/videos/suvi"
          PRODUCT: "suvi-primary-094"

  primary-094:deploy:
    desc: "Deploy 'public/videos/suvi/suvi-primary-094.mp4'"
    deps:
      - task: "primary-094:download"
    cmds:
      - task: ":ftp:copy-file"
        vars:
          SOURCE_FILE: "public/videos/suvi/suvi-primary-094.mp4"
          TARGET_FILE: "/videos/suvi/suvi-primary-094.mp4"

  primary-131:download:
