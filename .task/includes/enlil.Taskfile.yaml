version: "3"

tasks:
  download:
    desc: "Download 'public/videos/enlil' files"
    cmds:
      - task: ":swpc:download"
        vars:
          OUTPUT_DIR: "public/videos/enlil"
          PRODUCT: "enlil"

  deploy:
    desc: "Deploy 'public/videos/enlil' files"
    deps:
      - task: "download"
    cmds:
      - task: ":ftp:sync"
        vars:
          SOURCE_DIR: "public/videos/enlil"
          TARGET_DIR: "/videos/enlil"
